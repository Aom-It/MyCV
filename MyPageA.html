<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Witsanu 1</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #0f001a, #3a0ca3, #ff006e);
            background-size: 300% 300%;
            animation: bgMove 10s infinite alternate;
        }

        @keyframes bgMove {
            0% {
                background-position: left;
            }

            100% {
                background-position: right;
            }
        }

        .container {
            text-align: center;
            padding: 50px 60px;
            border-radius: 25px;

            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);

            box-shadow: 0 0 40px rgba(255, 0, 110, 0.7);

            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0);
            }
        }

        h1 {
            color: white;
            margin-bottom: 12px;
            text-shadow: 0 0 15px #ff006e;
            font-size: 28px;
        }

        p {
            color: #ddd;
            margin: 6px 0;
            font-size: 15px;
        }

        /* 🔥 รูปอยู่กลาง */
        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;

            border: 3px solid #ff006e;
            box-shadow: 0 0 25px #ff006e;

            display: block;
            margin: 25px auto;
            /* จัดกลาง */
            transition: 0.3s;
        }

        /* เพิ่มเอฟเฟกต์ตอน hover */
        .profile-img:hover {
            transform: scale(1.08);
            box-shadow: 0 0 40px #ff006e;
        }

        /* 🔥 ปุ่มอยู่ล่าง */
        .btn {
            display: inline-block;
            margin-top: 10px;

            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            color: white;

            background: linear-gradient(45deg, #7209b7, #ff006e);
            box-shadow: 0 0 15px rgba(255, 0, 110, 0.6);

            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 0, 110, 1);
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Witsanu Kaeokrachangsuk</h1>

        <p>Study Web Developer 💻</p>
        <p>Based in Thailand 🇹🇭</p>
        <p>ออกแบบ UI และเขียนเว็บไซต์  🔥</p>

        <!-- รูปอยู่กลาง -->
        <img src="images/Witsanu.png" class="profile-img">

        <!-- ปุ่มอยู่ล่าง -->
        <a href="index MyCV.html" class="btn">⬅ กลับหน้าแรก</a>

    </div>

</body>

</html>
